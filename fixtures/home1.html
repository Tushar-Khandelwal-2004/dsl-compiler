<free-tier-banner-1 />
<block key="atelier-header">
  <header-context (loaded)="hdr = $event" />

  <style>
    .ah-cart-wrap { filter: brightness(0) invert(1); opacity: 0.55; transition: opacity 0.25s ease; cursor: pointer; }
    .ah-cart-wrap:hover { opacity: 1; }
    .ah-shell { position: sticky; top: 0; z-index: 10000; backdrop-filter: blur(20px); background: rgba(28, 28, 26, 0.92); border-bottom: 1px solid rgba(74, 93, 78, 0.2); }
    .ah-shell::before { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--vw-accent), rgba(74,93,78,0.3), var(--vw-accent), transparent); pointer-events: none; }
    .ah-bar { max-width: 1280px; margin: 0 auto; padding: 0 48px; height: 72px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; box-sizing: border-box; position: relative; }
    .ah-nav-left { display: flex; gap: 40px; align-items: center; justify-content: flex-start; }
    .ah-nav-link { position: relative; text-decoration: none; font-family: 'League Spartan', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: rgba(248, 245, 240, 0.5); transition: color 0.3s ease; }
    .ah-nav-link::after { content: ""; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 0%; height: 1px; background: var(--vw-accent); transition: width 0.3s ease; }
    .ah-nav-link:hover { color: var(--vw-light); }
    .ah-nav-link:hover::after { width: 100%; }
    .ah-logo-wrap { display: flex; align-items: center; justify-content: center; height: 100%; }
    .ah-logo-wrap a { display: flex; align-items: center; justify-content: center; text-decoration: none; }
    .ah-logo { height: 44px; width: auto; display: block; transition: transform 0.3s ease; }
    .ah-logo-wrap:hover .ah-logo { transform: scale(1.04); }
    .ah-nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 32px; }
    .ah-user, .ah-login, .ah-admin { font-family: 'League Spartan', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: rgba(248, 245, 240, 0.5); text-decoration: none; transition: color 0.25s ease; }
    .ah-login:hover, .ah-admin:hover { color: var(--vw-light); }
    .ah-burger { display: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; }
    .ah-burger span { display: block; width: 22px; height: 1.5px; background: rgba(248, 245, 240, 0.6); transition: all 0.3s ease; }
    .ah-backdrop { position: fixed; inset: 0; background: rgba(15, 12, 8, 0.6); backdrop-filter: blur(8px); z-index: 10001; animation: ah-fade 0.25s ease; }
    .ah-drawer { position: fixed; top: 0; right: 0; width: 300px; max-width: 85vw; height: 100%; background: var(--vw-dark); z-index: 10002; padding: 88px 40px 48px; box-sizing: border-box; animation: ah-slide 0.3s ease; border-left: 1px solid rgba(74, 93, 78, 0.2); }
    .ah-drawer::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--vw-accent), rgba(74,93,78,0.3), transparent); }
    .ah-drawer-close { position: absolute; top: 24px; right: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; color: rgba(248, 245, 240, 0.5); border-radius: 50%; transition: color 0.2s ease, background 0.2s ease; }
    .ah-drawer-close:hover { color: var(--vw-light); background: rgba(74, 93, 78, 0.15); }
    .ah-drawer-ornament { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .ah-drawer-ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--vw-accent), transparent); }
    .ah-drawer-ornament-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--vw-accent); flex-shrink: 0; }
    .ah-drawer-link { display: block; padding: 16px 0; font-family: 'League Spartan', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; color: rgba(248, 245, 240, 0.5); border-bottom: 1px solid rgba(74, 93, 78, 0.1); transition: color 0.2s ease, padding-left 0.2s ease; }
    .ah-drawer-link:hover { color: var(--vw-light); padding-left: 8px; }
    .ah-drawer-footer { margin-top: 36px; padding-top: 28px; border-top: 1px solid rgba(74, 93, 78, 0.15); display: flex; flex-direction: column; gap: 14px; }
    .ah-drawer-login { display: block; text-align: center; text-decoration: none; font-family: 'League Spartan', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--vw-light); padding: 14px 24px; border: 1px solid rgba(74, 93, 78, 0.4); border-radius: 1px; transition: background 0.25s ease, border-color 0.25s ease; }
    .ah-drawer-login:hover { background: var(--vw-accent); border-color: var(--vw-accent); }
    @keyframes ah-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ah-slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @media (max-width: 1000px) { .ah-nav-left { display: none; } .ah-burger { display: flex; } .ah-user, .ah-login, .ah-admin { display: none; } .ah-bar { grid-template-columns: auto 1fr auto; padding: 0 24px; } }
  </style>

  <if [condition]="hdr">
    <div class="ah-shell">
      <div class="ah-bar">
        <div class="ah-nav-left">
          <loop [data]="hdr.navigation.entries" let="item">
            <a [href]="item.url" class="ah-nav-link">
              <print [value]="item.title" />
            </a>
          </loop>
        </div>
        <div class="ah-logo-wrap">
          <a [href]="hdr.navigation.homeUrl">
            <img [src]="hdr.branding.logoUrl" class="ah-logo" />
          </a>
        </div>
        <div class="ah-nav-right">
          <if [condition]="hdr.user.isLoggedIn" not>
            <a href="/login" class="ah-login"><editable-text elementId="hdr-signin" placeholder="Sign In" /></a>
          </if>
          <if [condition]="hdr.user.isLoggedIn">
            <if [condition]="hdr.user.isAdmin">
              <a href="/admin" class="ah-admin">
                <print [value]="hdr.user.name" /> · Admin
              </a>
            </if>
            <if [condition]="hdr.user.isAdmin" not>
              <span class="ah-user"><print [value]="hdr.user.name" /></span>
            </if>
          </if>
          <div class="ah-cart-wrap"><cart-button-1></cart-button-1></div>
          <div class="ah-burger" (click)="hdr.menuOpen = true">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>

    <if [condition]="hdr.menuOpen">
      <div class="ah-backdrop" (click)="hdr.menuOpen = false"></div>
      <div class="ah-drawer">
        <div class="ah-drawer-close" (click)="hdr.menuOpen = false">×</div>
        <div class="ah-drawer-ornament">
          <div class="ah-drawer-ornament-line"></div>
          <div class="ah-drawer-ornament-dot"></div>
        </div>
        <loop [data]="hdr.navigation.entries" let="m">
          <a [href]="m.url" class="ah-drawer-link" (click)="hdr.menuOpen = false">
            <print [value]="m.title" />
          </a>
        </loop>
        <div class="ah-drawer-footer">
          <if [condition]="hdr.user.isLoggedIn" not>
            <a href="/login" class="ah-drawer-login" (click)="hdr.menuOpen = false"><editable-text elementId="drawer-signin" placeholder="Sign In" /></a>
          </if>
          <if [condition]="hdr.user.isLoggedIn">
            <if [condition]="hdr.user.isAdmin">
              <a href="/admin" class="ah-drawer-login" (click)="hdr.menuOpen = false">
                <print [value]="hdr.user.name" /> · Admin
              </a>
            </if>
            <if [condition]="hdr.user.isAdmin" not>
              <span class="ah-user" style="text-align:center;display:block;">
                <print [value]="hdr.user.name" />
              </span>
            </if>
          </if>
        </div>
      </div>
    </if>
  </if>
</block>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=League+Spartan:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --vw-light: #f8f5f0;
      --vw-dark: #1c1c1a;
      --vw-accent: #4a5d4e;
      --vw-white: #ffffff;
      --vw-muted: #6b6866;
      --vw-footer-bg: #131311;
      --vw-card-img: #e8ded2;
      --vw-card-hover: #f0ebe3;
      --vw-prod-img: #ede7de;
    }

    .vw, .vw * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .vw { display: block; width: 100%; background: var(--vw-light); color: var(--vw-dark); overflow-x: hidden; }
    .vw, .vw * { font-family: 'League Spartan', sans-serif !important; }
    .vw-display, .vw-display * { font-family: 'Cormorant Garamond', Georgia, serif !important; }
    .vw-italic { font-style: italic; font-family: 'Cormorant Garamond', Georgia, serif !important; }
    @keyframes vw-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes vw-grow { from { transform: scale(0.94); } to { transform: scale(1); } }
    .vw-hero { position: relative; width: 100%; height: 100vh; min-height: 640px; overflow: hidden; background: var(--vw-dark); }
    .vw-hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
    .vw-hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(15,12,8,0.25) 0%, rgba(15,12,8,0.55) 60%, rgba(15,12,8,0.75) 100%); z-index: 1; }
    .vw-hero-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 0 48px 96px 48px; text-align: center; }
    .vw-hero-logo { position: absolute; top: 48px; left: 48px; width: 100px; z-index: 3; }
    .vw-hero-eyebrow { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 10px; font-weight: 700; letter-spacing: 7px; text-transform: uppercase; color: rgba(248,245,240,0.6); margin-bottom: 24px; }
    .vw-hero-title { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: clamp(56px, 8vw, 110px); font-weight: 300; line-height: 0.95; letter-spacing: -1px; color: var(--vw-light); margin: 0 0 20px 0; max-width: 900px; }
    .vw-hero-title em { font-style: italic; font-weight: 300; }
    .vw-hero-subtitle { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 16px; font-weight: 300; letter-spacing: 0.3px; line-height: 1.8; color: rgba(248,245,240,0.7); max-width: 500px; margin: 0 0 52px 0; }
    .vw-hero-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .vw-btn-primary { display: inline-flex; align-items: center; gap: 10px; font-family: 'League Spartan', sans-serif !important; font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--vw-dark); background: var(--vw-light); text-decoration: none; padding: 16px 32px; border-radius: 1px; transition: background 0.3s ease, color 0.3s ease; white-space: nowrap; }
    .vw-btn-primary:hover { background: var(--vw-accent); color: var(--vw-light); }
    .vw-btn-ghost { display: inline-flex; align-items: center; gap: 10px; font-family: 'League Spartan', sans-serif !important; font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--vw-light); background: transparent; text-decoration: none; padding: 15px 32px; border-radius: 1px; border: 1px solid rgba(248,245,240,0.4); transition: border-color 0.3s ease, background 0.3s ease; white-space: nowrap; }
    .vw-btn-ghost:hover { border-color: var(--vw-light); background: rgba(248,245,240,0.08); }
    .vw-hero-scroll { position: absolute; bottom: 48px; right: 48px; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .vw-hero-scroll-label { font-family: 'League Spartan', sans-serif !important; font-size: 9px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: rgba(248,245,240,0.4); writing-mode: vertical-rl; }
    .vw-hero-scroll-line { width: 1px; height: 48px; background: rgba(248,245,240,0.25); }
    .vw-marquee { width: 100%; max-width: 100%; background: var(--vw-dark); padding: 15px 0; overflow: hidden; white-space: nowrap; display: block; position: relative; }
    .vw-marquee-track { display: inline-block; animation: vw-scroll 24s linear infinite; will-change: transform; white-space: nowrap; }
    .vw-marquee-word { display: inline-block; font-family: 'League Spartan', sans-serif !important; font-size: 9px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: rgba(248,245,240,0.45); padding: 0 28px; }
    .vw-marquee-dot { color: var(--vw-accent); font-size: 14px; padding: 0 4px; }
    .vw-intro { background: var(--vw-light); padding: 96px 48px; text-align: center; display: block; width: 100%; border-bottom: 1px solid rgba(28,28,26,0.07); }
    .vw-intro-inner { max-width: 720px; margin: 0 auto; }
    .vw-intro-label { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 10px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--vw-accent); margin-bottom: 32px; }
    .vw-intro-title { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: clamp(36px, 4.5vw, 62px); font-weight: 300; letter-spacing: -0.5px; line-height: 1.15; color: var(--vw-dark); margin: 0 0 28px 0; }
    .vw-intro-title em { font-style: italic; }
    .vw-intro-body { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 16px; font-weight: 300; line-height: 1.9; color: var(--vw-muted); margin: 0; }
    .vw-features { background: var(--vw-white); padding: 112px 0; display: block; width: 100%; }
    .vw-features-header { max-width: 1280px; margin: 0 auto 72px auto; padding: 0 48px; display: flex; align-items: flex-end; justify-content: space-between; }
    .vw-features-title { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: clamp(36px, 4vw, 56px); font-weight: 300; letter-spacing: -0.5px; line-height: 1.1; color: var(--vw-dark); margin: 0; }
    .vw-features-title em { font-style: italic; }
    .vw-features-sub { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 13px; font-weight: 300; color: var(--vw-muted); max-width: 240px; line-height: 1.7; text-align: right; padding-bottom: 6px; }
    .vw-features-grid { max-width: 1280px; margin: 0 auto; padding: 0 48px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .vw-feature-card { display: flex; flex-direction: column; cursor: default; }
    .vw-feature-img { aspect-ratio: 3 / 4; overflow: hidden; border-radius: 3px; background: var(--vw-card-img); margin-bottom: 24px; }
    .vw-feature-img img { width: 100%; height: 100%; display: block; object-fit: cover; transition: transform 0.8s ease; }
    .vw-feature-card:hover .vw-feature-img img { transform: scale(1.05); }
    .vw-feature-number { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: 13px; font-weight: 400; letter-spacing: 2px; color: var(--vw-accent); margin-bottom: 10px; }
    .vw-feature-title { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: 26px; font-weight: 500; letter-spacing: -0.2px; color: var(--vw-dark); margin-bottom: 10px; line-height: 1.2; }
    .vw-feature-desc { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 16px; font-weight: 300; color: var(--vw-muted); line-height: 1.75; }
    .vw-about { background: var(--vw-light); padding: 0; display: block; width: 100%; }
    .vw-about-inner { display: grid; grid-template-columns: 1fr 1fr; min-height: 680px; }
    .vw-about-image { overflow: hidden; background: var(--vw-card-img); }
    .vw-about-image img { width: 100%; height: 100%; display: block; object-fit: cover; min-height: 680px; transition: transform 0.9s ease; }
    .vw-about-image:hover img { transform: scale(1.03); }
    .vw-about-copy { padding: 96px 80px; display: flex; flex-direction: column; justify-content: center; }
    .vw-about-label { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 10px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--vw-accent); margin-bottom: 12px; }
    .vw-about-label-line { display: block; width: 28px; height: 1px; background: var(--vw-accent); opacity: 0.4; margin-bottom: 36px; }
    .vw-about-title { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: clamp(34px, 3.5vw, 52px); font-weight: 300; letter-spacing: -0.5px; line-height: 1.1; color: var(--vw-dark); margin: 0 0 28px 0; }
    .vw-about-title em { font-style: italic; }
    .vw-about-body { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 16px; font-weight: 300; line-height: 1.9; color: var(--vw-muted); margin: 0 0 48px 0; }
    .vw-about-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .vw-about-item { display: flex; flex-direction: column; gap: 4px; padding: 20px 0; border-top: 1px solid rgba(28,28,26,0.08); }
    .vw-about-item-title { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--vw-dark); text-transform: uppercase; }
    .vw-about-item-desc { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 16px; font-weight: 300; color: var(--vw-muted); line-height: 1.6; }
    .vw-products { background: var(--vw-white); padding: 112px 0; display: block; width: 100%; }
    .vw-products-header { max-width: 1280px; margin: 0 auto 72px auto; padding: 0 48px; display: flex; align-items: flex-end; justify-content: space-between; }
    .vw-products-title { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: clamp(36px, 4vw, 56px); font-weight: 300; letter-spacing: -0.5px; line-height: 1.1; color: var(--vw-dark); margin: 0; }
    .vw-products-title em { font-style: italic; }
    .vw-products-badge { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--vw-accent); padding-bottom: 8px; }
    .vw-product-grid { max-width: 1280px; margin: 0 auto; padding: 0 48px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2px; }
    .vw-product-card { background: var(--vw-light); display: flex; flex-direction: column; cursor: pointer; transition: background 0.3s ease; view-timeline-name: --vw-card; view-timeline-axis: block; animation: vw-grow linear both; animation-timeline: --vw-card; animation-range: entry 5% cover 35%; }
    .vw-product-card:hover { background: var(--vw-card-hover); }
    .vw-product-img-wrap { aspect-ratio: 1 / 1; overflow: hidden; background: var(--vw-prod-img); display: flex; align-items: center; justify-content: center; padding: 40px; }
    .vw-product-img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; display: block; transition: transform 0.7s ease; }
    .vw-product-card:hover .vw-product-img { transform: scale(1.06); }
    .vw-product-body { padding: 28px 32px 36px 32px; display: flex; flex-direction: column; flex: 1; border-top: 1px solid rgba(28,28,26,0.07); }
    .vw-product-tag { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 9px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--vw-accent); margin-bottom: 10px; }
    .vw-product-name { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: 24px; font-weight: 500; color: var(--vw-dark); line-height: 1.2; letter-spacing: -0.2px; margin: 0 0 8px 0; }
    .vw-product-desc { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 12px; font-weight: 300; color: var(--vw-muted); line-height: 1.7; margin: 0 0 auto 0; flex: 1; }
    .vw-product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(28,28,26,0.07); }
    .vw-product-price { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: 26px; font-weight: 400; letter-spacing: -0.3px; color: var(--vw-dark); }
    .vw-product-btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'League Spartan', sans-serif !important; font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--vw-light); background: var(--vw-dark); text-decoration: none; padding: 11px 18px; border-radius: 1px; white-space: nowrap; transition: background 0.3s ease; }
    .vw-product-btn:hover { background: var(--vw-accent); }
    .vw-process { background: var(--vw-light); padding: 112px 0; display: block; width: 100%; }
    .vw-process-inner { max-width: 1280px; margin: 0 auto; padding: 0 48px; }
    .vw-process-header { text-align: center; margin-bottom: 80px; }
    .vw-process-label { display: block; font-family: 'League Spartan', sans-serif !important; font-size: 10px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--vw-accent); margin-bottom: 20px; }
    .vw-process-title { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: clamp(36px, 4vw, 56px); font-weight: 300; letter-spacing: -0.5px; line-height: 1.1; color: var(--vw-dark); }
    .vw-process-title em { font-style: italic; }
    .vw-process-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    .vw-process-step { padding: 40px 40px 40px 0; border-top: 1px solid rgba(28,28,26,0.1); position: relative; }
    .vw-process-step:last-child { padding-right: 0; }
    .vw-process-num { display: block; font-family: 'Cormorant Garamond', Georgia, serif !important; font-size: 64px; font-weight: 300; color: var(--vw-dark); line-height: 1; opacity: 0.08; margin-bottom: -10px; }
